    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    }
    html { overflow-y: scroll; scroll-behavior: smooth; }

    :root {
      --bg-primary: #0B0E13;
      --bg-card: #13171E;
      --bg-card-hover: #181D27;
      --bg-surface: #1C2230;
      --border: #2C3344;
      --border-subtle: #1C2230;
      --text-primary: #EAEAEA;
      --text-secondary: #9CA3AF;
      --text-muted: #6B7280;
      --copper: #D4956A;
      --copper-dim: #B07A52;
      --copper-glow: rgba(212,149,106,0.10);
      --green: #5EC892;
      --green-dim: rgba(94,200,146,0.12);
      --red: #EF6B6B;
      --red-dim: rgba(239,107,107,0.10);
      --blue: #60A5FA;
      --blue-dim: rgba(96,165,250,0.10);
      --font-sans: 'Plus Jakarta Sans', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
      --card-radius: 12px;
      --card-shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
      --card-shadow-lg: 0 4px 12px rgba(0,0,0,0.3), 0 12px 40px rgba(0,0,0,0.25);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .fade-up { animation: fadeUp 0.45s cubic-bezier(0.22, 1, 0.36, 1) both; }
    .fade-in { animation: fadeIn 0.35s ease both; }

    /* ── Global table improvements ─────────────────────────────── */
    table { border-spacing: 0; }
    thead tr { background: rgba(255,255,255,0.02); }
    tbody tr { transition: background 0.12s ease; }
    tbody tr:hover { background: rgba(255,255,255,0.03) !important; }
    tbody tr:nth-child(even) { background: rgba(255,255,255,0.015); }
    th { border-bottom: 1px solid var(--border) !important; }

    /* ── Scrollbar ─────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── Tab hover state ──────────────────────────────────────── */
    .tab-btn:hover { color: var(--text-secondary) !important; }
  </style>

// ─── Helpers ───────────────────────────────────────────────────────────────

const fmtM = (v) => {
  if (!v && v !== 0) return "$0";
  if (Math.abs(v) >= 1e9) return "$" + (v / 1e9).toFixed(1) + "B";
  if (Math.abs(v) >= 1e6) return "$" + (v / 1e6).toFixed(1) + "M";
  if (Math.abs(v) >= 1e3) return "$" + Math.round(v / 1e3).toLocaleString() + "K";
  return "$" + Math.round(v).toLocaleString();
};

const fmtK = (v) => {
  if (!v && v !== 0) return "$0";
  if (Math.abs(v) >= 1e6) return "$" + (v / 1e6).toFixed(2) + "M";
  if (Math.abs(v) >= 1e3) return "$" + Math.round(v / 1e3).toLocaleString() + "K";
  return "$" + Math.round(v).toLocaleString();
};

const probColor = (v) => v > 0.7 ? "var(--green)" : v > 0.4 ? "var(--copper)" : "var(--red)";

// ─── Shared Components ─────────────────────────────────────────────────────

function Metric({ label, value, sub, accent, delay }) {
  return (
    <div className="fade-up" style={{
      animationDelay: (delay || 0) + "ms",
      padding: "22px 26px",
      background: "var(--bg-card)",
      border: "1px solid var(--border-subtle)",
      borderRadius: "var(--card-radius)",
      boxShadow: "var(--card-shadow)",
      position: "relative",
      overflow: "hidden",
      transition: "box-shadow 0.2s ease, border-color 0.2s ease",
    }}>
      {accent && <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 2, background: accent }} />}
      <p style={{ fontFamily: "var(--font-sans)", fontSize: 11, fontWeight: 600, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.08em" }}>{label}</p>
      <p style={{ fontFamily: "var(--font-mono)", fontSize: 28, fontWeight: 600, color: accent || "var(--text-primary)", marginTop: 8, letterSpacing: "-0.03em", lineHeight: 1.1 }}>{value}</p>
      {sub && <p style={{ fontFamily: "var(--font-sans)", fontSize: 12, color: "var(--text-secondary)", marginTop: 6, lineHeight: 1.4 }}>{sub}</p>}
    </div>
  );
}

function ProbBar({ value }) {
  const pct = Math.round(value * 100);
  const color = probColor(value);
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, justifyContent: "center" }}>
      <div style={{ width: 56, height: 6, borderRadius: 3, background: "var(--bg-surface)", overflow: "hidden" }}>
        <div style={{ width: pct + "%", height: "100%", borderRadius: 3, background: color, transition: "width 0.4s ease" }} />
      </div>
      <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, fontWeight: 600, color, minWidth: 32, textAlign: "right" }}>{pct}%</span>
    </div>
  );
}

function ChartTooltip({ active, payload, label, suffix, formatter }) {
  if (!active || !payload || !payload.length) return null;
  return (
    <div style={{
      background: "var(--bg-card)", padding: "12px 16px", borderRadius: 10,
      border: "1px solid var(--border)", boxShadow: "var(--card-shadow-lg)",
      fontFamily: "var(--font-sans)", fontSize: 13,
    }}>
      <div style={{ fontWeight: 600, color: "var(--text-primary)", marginBottom: 4 }}>{label}</div>
      {payload.map((entry, i) => {
        const v = entry.value;
        const display = formatter ? formatter(v) : (typeof v === "number" ? v.toLocaleString() : v);
        return (
          <div key={i} style={{ color: entry.stroke || entry.fill || "var(--copper)", marginTop: 2 }}>
            {payload.length > 1 && <span style={{ color: "var(--text-secondary)" }}>{entry.name}: </span>}
            {display}{suffix || ""}
          </div>
        );
      })}
    </div>
  );
}

function SectionTitle({ title, sub }) {
  return (
    <div style={{ marginBottom: 18 }}>
      <h3 style={{ fontFamily: "var(--font-sans)", fontSize: 16, fontWeight: 700, color: "var(--text-primary)", letterSpacing: "-0.02em" }}>{title}</h3>
      {sub && <p style={{ fontFamily: "var(--font-sans)", fontSize: 12.5, color: "var(--text-muted)", marginTop: 4, lineHeight: 1.5 }}>{sub}</p>}
    </div>
  );
}


// ─── Optimization Recommendations Component ────────────────────────────────

function OptimizationRecommendations() {
  const rec = DATA.optimizationRecommendations || {};
  const items = rec.recommendations || [];
  if (items.length === 0) return null;

  const urgencyConfig = {
    immediate: { label: "IMMEDIATE", color: "var(--red)", bg: "rgba(232,113,106,0.12)" },
    this_week: { label: "THIS WEEK", color: "var(--copper)", bg: "var(--copper-glow)" },
    this_month: { label: "THIS MONTH", color: "var(--blue)", bg: "rgba(106,163,212,0.12)" },
  };
  const effortConfig = {
    low:    { label: "LOW EFFORT",    color: "var(--green)" },
    medium: { label: "MED EFFORT",   color: "var(--copper)" },
    high:   { label: "HIGH EFFORT",  color: "var(--red)" },
  };
  const categoryLabels = {
    lock_management:      "Lock Mgmt",
    pipeline_acceleration: "Pipeline",
    borrower_engagement:  "Borrower",
    resource_reallocation: "Ops Focus",
  };

  return (
    <div className="fade-up" style={{ marginBottom: 24, padding: 24, background: "var(--bg-card)", border: "1px solid var(--border-subtle)", borderRadius: "var(--card-radius)", boxShadow: "var(--card-shadow)" }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 18 }}>
        <div>
          <h3 style={{ fontFamily: "var(--font-sans)", fontSize: 15, fontWeight: 700, color: "var(--text-primary)", letterSpacing: "-0.01em" }}>
            This Week's Top Actions
          </h3>
          <p style={{ fontFamily: "var(--font-sans)", fontSize: 12, color: "var(--text-muted)", marginTop: 3 }}>
            Ranked by estimated dollar impact — {items.length} prioritized actions identified
          </p>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontFamily: "var(--font-mono)", fontSize: 22, fontWeight: 600, color: "var(--copper)", letterSpacing: "-0.02em" }}>
            {fmtM(rec.total_estimated_impact)}
          </div>
          <div style={{ fontFamily: "var(--font-sans)", fontSize: 11, color: "var(--text-muted)", marginTop: 2 }}>
            TOTAL ESTIMATED IMPACT
          </div>
        </div>
      </div>

      {/* Recommendation cards */}
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {items.map((item, i) => {
          const urg = urgencyConfig[item.urgency] || urgencyConfig.this_week;
          const eff = effortConfig[item.effort] || effortConfig.medium;
          const isPriority1 = item.priority === 1;
          const isImmediate = item.urgency === "immediate";

          return (
            <div key={i} style={{
              display: "flex", alignItems: "flex-start", gap: 16,
              padding: "14px 18px",
              background: isImmediate ? "rgba(232,113,106,0.05)" : "var(--bg-surface)",
              border: isImmediate ? "1px solid rgba(232,113,106,0.25)" : "1px solid var(--border-subtle)",
              borderRadius: 8,
              transition: "background 0.15s",
            }}>
              {/* Priority badge */}
              <div style={{
                flexShrink: 0,
                width: 32, height: 32,
                borderRadius: "50%",
                background: isPriority1 ? "var(--copper)" : isImmediate ? "rgba(232,113,106,0.2)" : "var(--bg-card)",
                border: isPriority1 ? "none" : `1px solid ${isImmediate ? "rgba(232,113,106,0.4)" : "var(--border)"}`,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontFamily: "var(--font-mono)", fontSize: 13, fontWeight: 700,
                color: isPriority1 ? "#0C0F14" : isImmediate ? "var(--red)" : "var(--text-secondary)",
              }}>
                {item.priority}
              </div>

              {/* Content */}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                  <span style={{ fontFamily: "var(--font-sans)", fontSize: 13, fontWeight: 600, color: "var(--text-primary)" }}>
                    {item.title}
                  </span>
                  <span style={{
                    fontFamily: "var(--font-mono)", fontSize: 9, fontWeight: 700,
                    padding: "2px 7px", borderRadius: 4,
                    color: urg.color, background: urg.bg,
                    letterSpacing: "0.04em",
                  }}>
                    {urg.label}
                  </span>
                  <span style={{
                    fontFamily: "var(--font-mono)", fontSize: 9, fontWeight: 600,
                    color: "var(--text-muted)", letterSpacing: "0.03em",
                  }}>
                    {categoryLabels[item.category] || item.category}
                  </span>
                </div>
                <p style={{ fontFamily: "var(--font-sans)", fontSize: 12, color: "var(--text-secondary)", marginTop: 4, lineHeight: 1.5 }}>
                  {item.description}
                </p>
                {item.confidence_caveat && (
                  <p style={{ fontFamily: "var(--font-sans)", fontSize: 11, color: "var(--copper)", marginTop: 4, lineHeight: 1.4, fontStyle: "italic" }}>

                  </p>
                )}
                <div style={{ display: "flex", alignItems: "center", gap: 14, marginTop: 6 }}>
                  <span style={{ fontFamily: "var(--font-sans)", fontSize: 11, color: "var(--text-muted)" }}>
                    {item.loan_count} loan{item.loan_count !== 1 ? "s" : ""} affected
                  </span>
                  <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, fontWeight: 600, color: eff.color }}>
                    {eff.label}
                  </span>
                </div>
              </div>

              {/* Impact */}
              <div style={{ flexShrink: 0, textAlign: "right" }}>
                <div style={{
                  fontFamily: "var(--font-mono)", fontSize: 18, fontWeight: 600,
                  color: item.estimated_impact > 0 ? "var(--green)" : "var(--text-muted)",
                  letterSpacing: "-0.01em",
                }}>
                  {item.estimated_impact > 0 ? "+" + fmtM(item.estimated_impact) : "Capacity"}
                </div>
                <div style={{ fontFamily: "var(--font-sans)", fontSize: 10, color: "var(--text-muted)", marginTop: 2 }}>
                  est. impact
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

              <Bar dataKey="live_loans" fill="var(--blue)" radius={[0, 3, 3, 0]} barSize={14} name="Live" />

// ─── Tab: Watch List ───────────────────────────────────────────────────────

function WatchListTab() {
  const atRisk = DATA.atRiskLoans || [];
  const [riskExpanded, setRiskExpanded] = useState(false);
  const [loanTab, setLoanTab] = useState("live");
  const [loanExpanded, setLoanExpanded] = useState(false);

  const riskColor = (reason) => {
    if (reason.includes("expires within")) return "var(--red)";
    if (reason.includes("already expired")) return "var(--red)";
    if (reason.includes("No rate lock")) return "var(--copper)";
    if (reason.includes("Sitting at")) return "var(--copper)";
    if (reason.includes("probability")) return "var(--text-muted)";
    return "var(--text-secondary)";
  };

  const RULE_LABELS = {
    opened_stale: "Stale at Open (30+ days)",
    application_stale: "Stale at App (30+ days)",
    submitted_unlocked_stale: "Submitted, No Lock (22+ days)",
    underwriting_unlocked_stale: "UW, No Lock (22+ days)",
    approved_expired_lock: "Lock Expired at Approved",
  };

  const riskShown = riskExpanded ? atRisk : atRisk.slice(0, 10);
  const allLoans = loanTab === "live" ? DATA.liveLoans : DATA.deadLoans;
  const loanShown = loanExpanded ? allLoans : allLoans.slice(0, 15);
  const isDead = loanTab === "dead";

  const thStyle = { padding: "10px 14px", fontFamily: "var(--font-sans)", fontSize: 11, fontWeight: 700, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.05em", whiteSpace: "nowrap", textAlign: "center" };

  return (
    <div>
      {/* At-Risk */}
      {atRisk.length > 0 && (
        <div className="fade-up" style={{ background: "var(--bg-card)", border: "1px solid var(--border-subtle)", borderRadius: 10, overflow: "hidden" }}>
          <div style={{ padding: "18px 24px", borderBottom: "1px solid var(--border-subtle)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <h3 style={{ fontFamily: "var(--font-sans)", fontSize: 16, fontWeight: 700, color: "var(--text-primary)", letterSpacing: "-0.02em" }}>
                At-Risk Watch List
              </h3>
              <p style={{ fontFamily: "var(--font-sans)", fontSize: 12, color: "var(--text-muted)", marginTop: 2 }}>
                Live loans needing ops intervention

            </div>
            <div style={{ fontFamily: "var(--font-mono)", fontSize: 14, fontWeight: 500, color: "var(--red)" }}>
              {atRisk.length} flagged &middot; {fmtM(atRisk.reduce((s, l) => s + (l.expected_value || 0), 0))} at stake
            </div>
          </div>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ borderBottom: "1px solid var(--border-subtle)" }}>
                  <th style={{ ...thStyle, width: 36 }}>#</th>
                  <th style={thStyle}>Product</th>
                  <th style={thStyle}>Stage</th>
                  <th style={thStyle}>Days</th>
                  <th style={thStyle}>Prob</th>
                  <th style={thStyle}>Amount</th>
                  <th style={{ ...thStyle, textAlign: "left" }}>Risk</th>
                  <th style={{ ...thStyle, textAlign: "left" }}>Action</th>
                  <th style={thStyle}>Impact</th>
                </tr>
              </thead>
              <tbody>
                {riskShown.map((loan, i) => (
                  <tr key={loan.loan_guid || i} style={{ borderBottom: "1px solid var(--border-subtle)", background: i % 2 === 0 ? "transparent" : "rgba(255,255,255,0.01)" }}>
                    <td style={{ ...tdStyle, color: "var(--text-muted)", fontFamily: "var(--font-mono)" }}>{i + 1}</td>
                    <td style={{ ...tdStyle, fontWeight: 600, color: "var(--text-primary)", textAlign: "left" }}>{loan.product_type || "\u2014"}</td>
                    <td style={{ ...tdStyle, color: "var(--text-secondary)" }}>{loan.current_stage}</td>
                    <td style={{ ...tdStyle, fontFamily: "var(--font-mono)", color: "var(--text-secondary)" }}>{loan.days_at_stage}d</td>
                    <td style={tdStyle}><ProbBar value={loan.ml_probability} /></td>
                    <td style={{ ...tdStyle, fontFamily: "var(--font-mono)", color: "var(--text-secondary)" }}>{fmtK(loan.loan_amount)}</td>
                    <td style={tdStyle}>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                        {loan.risk_reasons.map((reason, j) => {
                          const rc = riskColor(reason);
                          return (
                            <span key={j} style={{
                              display: "inline-block", padding: "2px 7px", borderRadius: 3,
                              fontFamily: "var(--font-sans)", fontSize: 9, fontWeight: 600,
                              color: rc, background: "var(--bg-surface)", border: "1px solid var(--border)",

                    </td>
                    <td style={{ ...tdStyle, textAlign: "left", fontFamily: "var(--font-sans)", fontSize: 11, color: "var(--text-secondary)" }}>
                      {loan.recommended_action || "\u2014"}

                    <td style={tdStyle}>
                      {loan.probability_delta > 0 ? (
                        <div>
                          <span style={{
                            display: "inline-block", padding: "2px 8px", borderRadius: 4,

                            color: "var(--green)", background: "var(--green-dim)",

                        <span style={{ color: "var(--text-muted)", fontSize: 10 }}>&mdash;</span>
                      )}
                    </td>

          {atRisk.length > 10 && (

              <button onClick={() => setRiskExpanded(!riskExpanded)} style={{
                background: "none", border: "1px solid var(--border)", borderRadius: 6,
                padding: "6px 18px", fontFamily: "var(--font-sans)", fontSize: 11, fontWeight: 600,
                color: "var(--text-secondary)", cursor: "pointer",
              }}>{riskExpanded ? "Collapse" : "Show all " + atRisk.length}</button>
            </div>
          )}
        </div>
      )}

      {/* Loan Table */}
      <div className="fade-up" style={{ animationDelay: "100ms", marginTop: 20, background: "var(--bg-card)", border: "1px solid var(--border-subtle)", borderRadius: 10, overflow: "hidden" }}>
        <div style={{ display: "flex", borderBottom: "1px solid var(--border-subtle)" }}>
          {["live", "dead"].map((key) => (
            <button key={key} onClick={() => { setLoanTab(key); setLoanExpanded(false); }} style={{
              padding: "14px 24px", fontFamily: "var(--font-sans)", fontSize: 12, fontWeight: 600,
              cursor: "pointer", background: "transparent", border: "none",
              borderBottom: loanTab === key ? "2px solid " + (key === "live" ? "var(--copper)" : "var(--red)") : "2px solid transparent",
              color: loanTab === key ? (key === "live" ? "var(--copper)" : "var(--red)") : "var(--text-muted)",
            }}>
              {key === "live" ? "Live Pipeline (" + DATA.liveLoans.length + ")" : "Eliminated (" + DATA.deadLoans.length + ")"}
            </button>
          ))}
        </div>
        <div style={{ padding: "10px 24px", fontSize: 12, fontFamily: "var(--font-sans)", color: "var(--text-muted)", background: isDead ? "var(--red-dim)" : "var(--blue-dim)", borderBottom: "1px solid var(--border-subtle)" }}>
          {isDead
            ? "Loans matching historical dead-loan patterns (<2% funding rate)"
            : "Ranked by expected value \u2014 P(fund) \u00d7 loan amount"}
        </div>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ borderBottom: "1px solid var(--border-subtle)" }}>
                <th style={{ ...thStyle, width: 36 }}>#</th>
                <th style={thStyle}>Product</th>
                <th style={thStyle}>Stage</th>
                <th style={thStyle}>Days</th>
                <th style={thStyle}>Lock</th>
                <th style={thStyle}>Probability</th>
                <th style={thStyle}>Amount</th>
                <th style={thStyle}>Exp. Value</th>
                {isDead && <th style={thStyle}>Rule</th>}
                {isDead && <th style={thStyle}>Archetype</th>}
              </tr>
            </thead>
            <tbody>
              {loanShown.map((loan, i) => (
                <tr key={loan.loan_guid} style={{ borderBottom: "1px solid var(--border-subtle)", opacity: isDead ? 0.6 : 1, background: i % 2 === 0 ? "transparent" : "rgba(255,255,255,0.01)" }}>
                  <td style={{ ...tdStyle, color: "var(--text-muted)", fontFamily: "var(--font-mono)" }}>{i + 1}</td>
                  <td style={{ ...tdStyle, fontWeight: 600, color: isDead ? "var(--text-muted)" : "var(--text-primary)", textAlign: "left" }}>{loan.product_type || "\u2014"}</td>
                  <td style={{ ...tdStyle, color: "var(--text-secondary)" }}>{loan.current_stage}</td>
                  <td style={{ ...tdStyle, fontFamily: "var(--font-mono)", color: "var(--text-secondary)" }}>{loan.days_at_stage}d</td>
                  <td style={{ ...tdStyle, fontSize: 14 }}>{loan.is_locked ? "\ud83d\udd12" : "\ud83d\udd13"}</td>
                  <td style={tdStyle}><ProbBar value={loan.ml_probability} /></td>
                  <td style={{ ...tdStyle, fontFamily: "var(--font-mono)", color: "var(--text-secondary)" }}>{fmtK(loan.loan_amount)}</td>
                  <td style={{ ...tdStyle, fontFamily: "var(--font-mono)", fontWeight: 600, color: isDead ? "var(--text-muted)" : "var(--text-primary)" }}>{fmtK(loan.expected_value)}</td>
                  {isDead && <td style={{ ...tdStyle, fontSize: 10, color: "var(--text-muted)", textAlign: "left" }}>{RULE_LABELS[loan.elimination_rule] || loan.elimination_rule || "\u2014"}</td>}
                  {isDead && <td style={{ ...tdStyle, fontSize: 10, color: "var(--text-muted)", textAlign: "left" }}>{loan.failure_archetype || "\u2014"}</td>}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {allLoans.length > 15 && (
          <div style={{ textAlign: "center", padding: "12px 0", borderTop: "1px solid var(--border-subtle)" }}>
            <button onClick={() => setLoanExpanded(!loanExpanded)} style={{
              background: "none", border: "1px solid var(--border)", borderRadius: 6,
              padding: "6px 18px", fontFamily: "var(--font-sans)", fontSize: 11, fontWeight: 600,
              color: "var(--text-secondary)", cursor: "pointer",
            }}>{loanExpanded ? "Collapse" : "Show all " + allLoans.length}</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Tab: Trends ───────────────────────────────────────────────────────────

function PTDot(props) {
  const { cx, cy, payload } = props;
  if (!cx || !cy) return null;
  if (payload && payload.partial) {
    return (
      <g>
        <circle cx={cx} cy={cy} r={4} fill="var(--bg-card)" stroke="var(--copper)" strokeWidth={2} strokeDasharray="3 2" />
        <text x={cx + 8} y={cy - 6} fontSize={9} fill="var(--text-muted)" fontStyle="italic" fontFamily="var(--font-sans)">Partial</text>
      </g>
    );
  }
  return <circle cx={cx} cy={cy} r={2.5} fill="var(--copper)" strokeWidth={0} />;
}

// ─── Component: Moneyball Matrix ─────────────────────────────────────────

function MoneyballMatrix() {
  const mb = DATA.moneyballMatrix;
  if (!mb || !mb.loans) return null;

  const loans = mb.loans || [];
  const qs = mb.quadrant_summary || {};

  const quadrantMeta = {
    easy_win:  { label: "Easy Wins",  color: "#3DAA7F", icon: "\u2713", desc: "High probability, low difficulty" },
    quick_fix: { label: "Quick Fixes", color: "#D4956A", icon: "\u26A1", desc: "Low probability but easy to execute" },
    stretch:   { label: "Stretch",     color: "#4A90D9", icon: "\u2197", desc: "High probability but hard to execute" },
    long_shot: { label: "Long Shots",  color: "#E85A5A", icon: "\u2716", desc: "Low probability, high difficulty" },
  };

  // Group loans by quadrant for separate Scatter series
  const grouped = {};
  const movableLoans = [];
  loans.forEach(l => {
    if (l.is_movable) {
      movableLoans.push(l);
    } else {
      if (!grouped[l.quadrant]) grouped[l.quadrant] = [];
      grouped[l.quadrant].push(l);
    }
  });

  const quadrantOrder = ["easy_win", "quick_fix", "stretch", "long_shot"];

  const CustomTooltip = ({ active, payload }) => {
    if (!active || !payload || !payload.length) return null;
    const d = payload[0].payload;
    return (
      <div style={{
        background: "var(--bg-card)", border: "1px solid var(--border-subtle)",
        borderRadius: 8, padding: "12px 16px", boxShadow: "var(--card-shadow-lg)",
        maxWidth: 260,
      }}>
        <p style={{ fontFamily: "var(--font-sans)", fontSize: 12, fontWeight: 700, color: "var(--text-primary)", marginBottom: 6 }}>
          {d.product_type} &middot; {d.current_stage}
        </p>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "4px 16px", fontFamily: "var(--font-mono)", fontSize: 11 }}>
          <span style={{ color: "var(--text-muted)" }}>Amount</span>
          <span style={{ color: "var(--text-primary)", textAlign: "right" }}>{fmtK(d.loan_amount)}</span>
          <span style={{ color: "var(--text-muted)" }}>Probability</span>
          <span style={{ color: "var(--text-primary)", textAlign: "right" }}>{(d.probability * 100).toFixed(1)}%</span>
          <span style={{ color: "var(--text-muted)" }}>Difficulty</span>
          <span style={{ color: "var(--text-primary)", textAlign: "right" }}>{d.difficulty}</span>
          <span style={{ color: "var(--text-muted)" }}>Exp Value</span>
          <span style={{ color: "var(--copper)", textAlign: "right" }}>{fmtK(d.expected_value)}</span>
          <span style={{ color: "var(--text-muted)" }}>Days@Stage</span>
          <span style={{ color: "var(--text-primary)", textAlign: "right" }}>{d.days_at_stage}d</span>
          <span style={{ color: "var(--text-muted)" }}>Locked</span>
          <span style={{ color: d.is_locked ? "var(--green)" : "var(--red)", textAlign: "right" }}>{d.is_locked ? "Yes" : "No"}</span>
        </div>
        {d.is_movable && (
          <div style={{ marginTop: 8, padding: "6px 8px", borderRadius: 4, background: "rgba(255,215,0,0.12)", border: "1px solid rgba(255,215,0,0.3)" }}>
            <p style={{ fontFamily: "var(--font-sans)", fontSize: 10, fontWeight: 600, color: "#FFD700" }}>
              {d.cf_action} → moves to {quadrantMeta[d.cf_quadrant] ? quadrantMeta[d.cf_quadrant].label : d.cf_quadrant}
            </p>
          </div>
        )}
      </div>
    );
  };

  return (

function PipelineHealthTab() {
  const bn = DATA.bottleneckDetection;
  const vm = DATA.velocityMomentum;
  const heatmap = bn.heatmap || [];
  const products = bn.products || [];
  const convRates = bn.conversion_rates || [];
  const bottlenecks = bn.current_bottlenecks || [];
  const distribution = vm.distribution || [];
  const stageVel = vm.stage_velocity || [];
  const alerts = vm.momentum_alerts || [];

  const [selectedProduct, setSelectedProduct] = useState("All");
  const productOptions = ["All", ...(bn.products || [])];

  const activeConvRates = selectedProduct !== "All" && bn.conversion_by_product && bn.conversion_by_product[selectedProduct] ? bn.conversion_by_product[selectedProduct] : convRates;
  const activeDistribution = selectedProduct !== "All" && vm.distribution_by_product && vm.distribution_by_product[selectedProduct] ? vm.distribution_by_product[selectedProduct] : distribution;
  const activeBottlenecks = selectedProduct !== "All" && bn.current_bottlenecks_by_product && bn.current_bottlenecks_by_product[selectedProduct] ? bn.current_bottlenecks_by_product[selectedProduct] : bottlenecks;

  const thStyle = { padding: "10px 14px", fontFamily: "var(--font-sans)", fontSize: 11, fontWeight: 700, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.05em", whiteSpace: "nowrap", textAlign: "center" };
  const tdStyle = { padding: "12px 14px", fontFamily: "var(--font-sans)", fontSize: 13, textAlign: "center" };

  // Color scale for heatmap cells (days)
  const heatColor = (v, transition) => {
    if (v === null || v === undefined) return { bg: "transparent", text: "var(--text-muted)" };
    // Approved→CTC is the long one — different scale
    const isLong = transition.includes("Approved");
    const thresholds = isLong ? [10, 18, 25, 35] : [2, 5, 8, 12];
    if (v <= thresholds[0]) return { bg: "rgba(107,191,138,0.2)", text: "var(--green)" };
    if (v <= thresholds[1]) return { bg: "rgba(107,191,138,0.1)", text: "var(--green)" };
    if (v <= thresholds[2]) return { bg: "rgba(212,149,106,0.15)", text: "var(--copper)" };
    if (v <= thresholds[3]) return { bg: "rgba(232,113,106,0.12)", text: "var(--red)" };
    return { bg: "rgba(232,113,106,0.2)", text: "var(--red)" };
  };

  const bandColors = {
    "Fast Track": "var(--green)",
    "On Pace": "var(--blue)",
    "Slow": "var(--copper)",
    "Stalled": "var(--red)",
  };

  const bandDimColors = {
    "Fast Track": "var(--green-dim)",
    "On Pace": "var(--blue-dim)",
    "Slow": "var(--copper-glow)",
    "Stalled": "var(--red-dim)",
  };

  const totalVelLoans = activeDistribution.reduce((s, d) => s + d.loan_count, 0);

  return (
    <div>
      {/* Product Filter Bar */}
      <div className="fade-up" style={{ marginBottom: 16, display: "flex", alignItems: "center", gap: 12 }}>
        <span style={{ fontFamily: "var(--font-sans)", fontSize: 12, fontWeight: 600, color: "var(--text-muted)" }}>Filter by Product:</span>
        {productOptions.map(p => (
          <button key={p} onClick={() => setSelectedProduct(p)} style={{
            padding: "5px 14px", borderRadius: 6, cursor: "pointer",
            fontFamily: "var(--font-sans)", fontSize: 11, fontWeight: 600,
            border: selectedProduct === p ? "1px solid var(--copper)" : "1px solid var(--border-subtle)",
            background: selectedProduct === p ? "rgba(212,149,106,0.12)" : "var(--bg-surface)",
            color: selectedProduct === p ? "var(--copper)" : "var(--text-muted)",
          }}>{p}</button>
        ))}
      </div>

      {/* Row 1: Bottleneck Heatmap + Conversion Funnel */}
      <div style={{ display: "grid", gridTemplateColumns: "3fr 2fr", gap: 16 }}>

        {/* Bottleneck Heatmap */}
        <div className="fade-up" style={{ padding: 24, background: "var(--bg-card)", border: "1px solid var(--border-subtle)", borderRadius: "var(--card-radius)", boxShadow: "var(--card-shadow)" }}>
          <SectionTitle title="Stage Transition Times by Product" sub="Median days between pipeline stages vs ICE Mortgage 2024 industry benchmarks. Green = faster than benchmark." />
          <div style={{ overflowX: "auto", marginTop: 8 }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ borderBottom: "1px solid var(--border-subtle)" }}>
                  <th style={{ ...thStyle, textAlign: "left" }}>Transition</th>
                  <th style={{ ...thStyle, textAlign: "center" }}>Overall</th>
                  <th style={{ ...thStyle, textAlign: "center", color: "var(--copper)" }}>Industry</th>
                  {products.map(p => (
                    <th key={p} style={{ ...thStyle, textAlign: "center" }}>{p}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {heatmap.map((row, i) => (
                  <tr key={i} style={{ borderBottom: "1px solid var(--border-subtle)" }}>
                    <td style={{ ...tdStyle, fontWeight: 600, color: "var(--text-primary)", whiteSpace: "nowrap", textAlign: "left" }}>{row.transition}</td>
                    <td style={{ ...tdStyle, textAlign: "center" }}>
                      <span style={{
                        fontFamily: "var(--font-mono)", fontSize: 13, fontWeight: 600,
                        color: "var(--text-primary)",
                      }}>{row.overall_median}d</span>
                      {row.overall_p25 != null && row.overall_p75 != null && (
                        <div style={{ fontFamily: "var(--font-mono)", fontSize: 9, color: "var(--text-muted)", marginTop: 1 }}>({row.overall_p25}&ndash;{row.overall_p75})</div>
                      )}
                    </td>
                    <td style={{ ...tdStyle, textAlign: "center" }}>
                      {row.benchmark_overall != null ? (
                        <div>
                          <span style={{ fontFamily: "var(--font-mono)", fontSize: 12, fontWeight: 600, color: "var(--text-muted)" }}>{row.benchmark_overall}d</span>
                          {row.benchmark_fast != null && (
                            <div style={{ fontFamily: "var(--font-mono)", fontSize: 9, color: "var(--text-muted)", marginTop: 1 }}>({row.benchmark_fast}&ndash;{row.benchmark_slow})</div>

                                display: "inline-block", padding: "4px 10px", borderRadius: 4,

                          ) : (
                            <span style={{ color: "var(--text-muted)", fontSize: 10 }}>&mdash;</span>
                          )}
                        </td>
                      );
                    })}

                ))}

            </table>

            <span style={{ fontFamily: "var(--font-sans)", fontSize: 10, color: "var(--text-muted)" }}>
              Industry benchmarks: ICE Mortgage Technology 2024
            </span>
            <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--green)" }}>&#9679; Faster than benchmark</span>
            <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--copper)" }}>&#9679; Near benchmark</span>
            <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--red)" }}>&#9679; Slower than benchmark</span>

        {/* Conversion Funnel */}

                <div key={c.stage} className="fade-up" style={{
                  animationDelay: (120 + i * 40) + "ms",
                  display: "flex", alignItems: "center", gap: 12, marginBottom: 10,
                }}>
                  <span style={{ fontFamily: "var(--font-sans)", fontSize: 11, fontWeight: 500, color: "var(--text-secondary)", width: 90, textAlign: "right", flexShrink: 0 }}>{c.stage}</span>
                  <div style={{ flex: 1, height: 20, borderRadius: 4, background: "var(--bg-surface)", overflow: "hidden", position: "relative" }}>
                    <div style={{ width: pct + "%", height: "100%", borderRadius: 4, background: barColor, transition: "width 0.6s ease" }} />
                    <span style={{
                      position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)",
                      fontFamily: "var(--font-mono)", fontSize: 10, fontWeight: 600, color: "var(--text-primary)",
                    }}>{pct}%</span>
                  </div>
                  <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--text-muted)", width: 50, flexShrink: 0 }}>{c.funded_count.toLocaleString()}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Row 2: Velocity Distribution + Current Bottlenecks */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginTop: 20 }}>

        {/* Velocity Distribution */}
        <div className="fade-up" style={{ animationDelay: "300ms", padding: 24, background: "var(--bg-card)", border: "1px solid var(--border-subtle)", borderRadius: "var(--card-radius)", boxShadow: "var(--card-shadow)" }}>
          <SectionTitle title="Loan Velocity Distribution" sub="How fast are loans moving through the pipeline? Velocity = stages progressed per day since open." />
          <div style={{ marginTop: 12 }}>
            {activeDistribution.map((d, i) => {
              const pct = totalVelLoans > 0 ? (d.loan_count / totalVelLoans * 100) : 0;
              const color = bandColors[d.band] || "var(--text-secondary)";
              const dimColor = bandDimColors[d.band] || "var(--bg-surface)";
              return (
                <div key={d.band} className="fade-up" style={{
                  animationDelay: (340 + i * 60) + "ms",
                  padding: "14px 18px", marginBottom: 8, borderRadius: 8,
                  background: dimColor, border: "1px solid var(--border-subtle)",
                }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{
                        display: "inline-block", width: 8, height: 8, borderRadius: "50%",
                        background: color,
                      }} />
                      <span style={{ fontFamily: "var(--font-sans)", fontSize: 13, fontWeight: 600, color: "var(--text-primary)" }}>{d.band}</span>
                      <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-muted)" }}>{d.loan_count} loans</span>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <span style={{ fontFamily: "var(--font-mono)", fontSize: 15, fontWeight: 600, color }}>{fmtM(d.total_value)}</span>
                    </div>
                  </div>
                  <div style={{ height: 6, borderRadius: 3, background: "var(--bg-card)", overflow: "hidden" }}>
                    <div style={{ width: pct + "%", height: "100%", borderRadius: 3, background: color, transition: "width 0.6s ease" }} />
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
                    <span style={{ fontFamily: "var(--font-sans)", fontSize: 10, color: "var(--text-muted)" }}>{Math.round(pct)}% of pipeline</span>
                    <span style={{ fontFamily: "var(--font-sans)", fontSize: 10, color: "var(--text-muted)" }}>Avg prob: {(d.avg_probability * 100).toFixed(0)}%</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Current Bottlenecks */}
        <div className="fade-up" style={{ animationDelay: "400ms", padding: 24, background: "var(--bg-card)", border: "1px solid var(--border-subtle)", borderRadius: "var(--card-radius)", boxShadow: "var(--card-shadow)" }}>
          <SectionTitle title="Where Loans Are Piling Up" sub="Current pipeline concentration by stage — high average days with many loans indicates a bottleneck" />
          <div style={{ marginTop: 12 }}>
            {activeBottlenecks.filter(b => b.loan_count >= 5).map((b, i) => {
              const isBottleneck = b.pct_over_30d > 20;
              return (
                <div key={b.stage} className="fade-up" style={{
                  animationDelay: (440 + i * 40) + "ms",
                  display: "flex", alignItems: "center", gap: 12, marginBottom: 10,
                  padding: "10px 14px", borderRadius: 6,
                  background: isBottleneck ? "var(--red-dim)" : "transparent",
                  border: isBottleneck ? "1px solid rgba(232,113,106,0.2)" : "1px solid transparent",
                }}>
                  <span style={{ fontFamily: "var(--font-sans)", fontSize: 11, fontWeight: 600, color: isBottleneck ? "var(--red)" : "var(--text-secondary)", width: 80, flexShrink: 0 }}>{b.stage}</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                      <span style={{ fontFamily: "var(--font-mono)", fontSize: 12, fontWeight: 500, color: "var(--text-primary)" }}>{b.loan_count} loans &middot; {fmtM(b.total_value)}</span>
                      <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: isBottleneck ? "var(--red)" : "var(--text-muted)" }}>
                        med {b.median_days_at_stage != null ? b.median_days_at_stage : b.avg_days_at_stage}d
                        {b.p25_days_at_stage != null ? " (IQR " + b.p25_days_at_stage + "\u2013" + b.p75_days_at_stage + ")" : ""}
                        {b.pct_over_30d > 0 ? " \u00b7 " + b.pct_over_30d + "% over 30d" : ""}
                      </span>
                    </div>
                    <div style={{ height: 4, borderRadius: 2, background: "var(--bg-surface)", overflow: "hidden" }}>
                      <div style={{
                        width: Math.min(100, b.avg_days_at_stage / 60 * 100) + "%",
                        height: "100%", borderRadius: 2,
                        background: isBottleneck ? "var(--red)" : "var(--blue)",
                      }} />
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Row 3: Momentum Alerts */}
      {alerts.length > 0 && (
        <div className="fade-up" style={{ animationDelay: "500ms", marginTop: 20, background: "var(--bg-card)", border: "1px solid var(--border-subtle)", borderRadius: 10, overflow: "hidden" }}>
          <div style={{ padding: "18px 24px", borderBottom: "1px solid var(--border-subtle)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <h3 style={{ fontFamily: "var(--font-sans)", fontSize: 16, fontWeight: 700, color: "var(--text-primary)", letterSpacing: "-0.02em" }}>Momentum Alerts</h3>
              <p style={{ fontFamily: "var(--font-sans)", fontSize: 12, color: "var(--text-muted)", marginTop: 2 }}>Loans with below-median velocity that still have a reasonable probability of funding — these are decelerating and need attention</p>
            </div>
            <span style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--copper)" }}>
              {fmtM(alerts.reduce((s, a) => s + (a.expected_value || 0), 0))} expected value
            </span>
          </div>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ borderBottom: "1px solid var(--border-subtle)" }}>
                  <th style={{ ...thStyle, width: 36 }}>#</th>
                  <th style={thStyle}>Product</th>
                  <th style={thStyle}>Stage</th>
                  <th style={thStyle}>Days</th>
                  <th style={thStyle}>Velocity</th>
                  <th style={thStyle}>Prob</th>
                  <th style={thStyle}>Amount</th>
                  <th style={thStyle}>Exp. Value</th>
                </tr>
              </thead>
              <tbody>
                {alerts.map((a, i) => {
                  const vc = bandColors[a.velocity_band] || "var(--text-muted)";
                  return (
                    <tr key={a.loan_guid || i} style={{ borderBottom: "1px solid var(--border-subtle)", background: i % 2 === 0 ? "transparent" : "rgba(255,255,255,0.01)" }}>
                      <td style={{ ...tdStyle, color: "var(--text-muted)", fontFamily: "var(--font-mono)" }}>{i + 1}</td>
                      <td style={{ ...tdStyle, fontWeight: 600, color: "var(--text-primary)", textAlign: "left" }}>{a.product_type || "\u2014"}</td>
                      <td style={{ ...tdStyle, color: "var(--text-secondary)" }}>{a.current_stage}</td>
                      <td style={{ ...tdStyle, fontFamily: "var(--font-mono)", color: "var(--text-secondary)" }}>{a.days_at_stage}d</td>
                      <td style={tdStyle}>
                        <span style={{
                          display: "inline-block", padding: "2px 8px", borderRadius: 4,
                          fontFamily: "var(--font-mono)", fontSize: 11, fontWeight: 600,
                          color: vc, background: bandDimColors[a.velocity_band] || "var(--bg-surface)",
                        }}>{a.velocity.toFixed(3)}</span>
                      </td>
                      <td style={tdStyle}><ProbBar value={a.ml_probability} /></td>
                      <td style={{ ...tdStyle, fontFamily: "var(--font-mono)", color: "var(--text-secondary)" }}>{fmtK(a.loan_amount)}</td>
                      <td style={{ ...tdStyle, fontFamily: "var(--font-mono)", fontWeight: 600, color: "var(--text-primary)" }}>{fmtK(a.expected_value)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

function WhatIfTab() {

  const scenarios = (wi && wi.scenarios) ? wi.scenarios : [];

  const scenarioColors = {

  return (
    <div>
      {/* Hero Banner */}
      <div className="fade-up" style={{
        marginBottom: 20,

        <div style={{
          position: "absolute", top: -40, right: -40,

          pointerEvents: "none",

        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 24 }}>
          {/* Left: headline */}
          <div style={{ flex: 1 }}>

              What-If Scenario Engine
            </p>
            <h2 style={{ fontFamily: "var(--font-sans)", fontSize: 22, fontWeight: 700, color: "var(--text-primary)", letterSpacing: "-0.02em", marginBottom: 6 }}>
              {fmtM(wi.adjusted_potential_delta || totalDelta)} in realistic recoverable volume
            </h2>
            <p style={{ fontFamily: "var(--font-sans)", fontSize: 13, color: "var(--text-secondary)", lineHeight: 1.6, maxWidth: 600 }}>
              Four operational levers could add <strong style={{ color: "var(--copper)" }}>{wi.adjusted_upside_pct || upsidePct}%</strong> to
              the current projection (overlap-adjusted from {upsidePct}% raw).
              Scenarios share overlapping loan populations — the adjusted total accounts for this.
            </p>
          </div>

          {/* Right: summary metrics */}
          <div style={{ display: "flex", gap: 12, flexShrink: 0 }}>
            <div style={{ padding: "16px 20px", background: "var(--bg-surface)", borderRadius: 8, border: "1px solid var(--border-subtle)", textAlign: "center", minWidth: 110 }}>
              <p style={{ fontFamily: "var(--font-mono)", fontSize: 20, fontWeight: 600, color: "var(--copper)", letterSpacing: "-0.02em" }}>{fmtM(currentProj)}</p>
              <p style={{ fontFamily: "var(--font-sans)", fontSize: 10, color: "var(--text-muted)", marginTop: 4 }}>Current Projection</p>
            </div>
            <div style={{ display: "flex", alignItems: "center", padding: "0 4px" }}>
              <span style={{ fontFamily: "var(--font-mono)", fontSize: 20, color: "var(--text-muted)" }}>→</span>
            </div>
            <div style={{ padding: "16px 20px", background: "rgba(212,149,106,0.08)", borderRadius: 8, border: "1px solid rgba(212,149,106,0.25)", textAlign: "center", minWidth: 110 }}>
              <p style={{ fontFamily: "var(--font-mono)", fontSize: 20, fontWeight: 600, color: "var(--copper)", letterSpacing: "-0.02em" }}>{fmtM(currentProj + (wi.adjusted_potential_delta || totalDelta))}</p>
              <p style={{ fontFamily: "var(--font-sans)", fontSize: 10, color: "var(--copper-dim)", marginTop: 4 }}>Realistic Upside (adj.)</p>
            </div>
          </div>
        </div>

        {/* Total potential bar */}
        <div style={{ marginTop: 20 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
            <span style={{ fontFamily: "var(--font-sans)", fontSize: 11, color: "var(--text-muted)" }}>
              Total potential upside across {scenarios.length} levers
            </span>
            <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--copper)", fontWeight: 600 }}>
              +{upsidePct}% vs current projection
            </span>
          </div>
          <div style={{ height: 6, borderRadius: 3, background: "var(--bg-surface)", overflow: "hidden" }}>
            <div style={{
              height: "100%", borderRadius: 3,
              width: Math.min(100, upsidePct) + "%",
              background: "linear-gradient(90deg, var(--copper) 0%, #E8A87A 100%)",
              transition: "width 0.8s ease",
            }} />
          </div>
        </div>
      </div>

      {/* Scenario Cards Grid */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
        {scenarios.map((s, i) => {
          const colors = scenarioColors[s.id] || { accent: "var(--copper)", dim: "var(--copper-glow)" };
          const icon = scenarioIcons[s.id] || "◆";
          const totalImpact = totalDelta > 0 ? (s.delta / totalDelta * 100) : 0;
          const currentPct = livePipeline > 0 ? (s.current_value / livePipeline * 100) : 0;
          const improvedPct = livePipeline > 0 ? (s.improved_value / livePipeline * 100) : 0;

              animationDelay: (i * 80) + "ms",

                      fontFamily: "var(--font-mono)", fontSize: 14,
                      color: colors.accent, width: 22, textAlign: "center",

                        fontFamily: "var(--font-mono)", fontSize: 9, fontWeight: 600,

                        background: s.confidence === "medium" ? "var(--copper-glow)" : s.confidence.includes("low") ? "var(--red-dim)" : "var(--green-dim)",
                        textTransform: "uppercase", letterSpacing: "0.04em",
                      }}>{s.confidence}</span>
                    )}
                  </div>
                  <p style={{ fontFamily: "var(--font-sans)", fontSize: 12, color: "var(--text-secondary)", lineHeight: 1.55 }}>{s.description}</p>
                </div>

                {/* Delta badge */}
                <div style={{
                  flexShrink: 0, textAlign: "right",
                  padding: "10px 14px",
                  background: colors.dim,

                  border: "1px solid var(--border)",

              </div>

              {/* Before / After */}
              <div style={{ background: "var(--bg-surface)", borderRadius: 8, padding: "14px 16px" }}>
                <div style={{ display: "flex", gap: 0, marginBottom: 10 }}>
                  <div style={{ flex: 1, paddingRight: 12, borderRight: "1px solid var(--border-subtle)" }}>
                    <p style={{ fontFamily: "var(--font-sans)", fontSize: 9, fontWeight: 600, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 4 }}>Current State</p>
                    <p style={{ fontFamily: "var(--font-sans)", fontSize: 11, color: "var(--text-secondary)", lineHeight: 1.5 }}>{s.current_state}</p>
                  </div>
                  <div style={{ flex: 1, paddingLeft: 12 }}>
                    <p style={{ fontFamily: "var(--font-sans)", fontSize: 9, fontWeight: 600, color: colors.accent, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 4 }}>Target State</p>
                    <p style={{ fontFamily: "var(--font-sans)", fontSize: 11, color: "var(--text-primary)", lineHeight: 1.5 }}>{s.target_state}</p>
                  </div>
                </div>

                {/* Expected Value bar: before → after */}
                <div>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-muted)" }}>
                      {fmtM(s.current_value)} now
                    </span>
                    <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, fontWeight: 600, color: colors.accent }}>
                      {fmtM(s.improved_value)} projected
                    </span>
                  </div>
                  <div style={{ height: 8, borderRadius: 4, background: "var(--bg-card)", overflow: "hidden", position: "relative" }}>
                    {/* Current bar */}
                    <div style={{
                      position: "absolute", top: 0, left: 0,
                      width: Math.min(100, improvedPct) + "%",

                    Assumptions &amp; Caveats
                  </p>
                  {s.caveats.map((caveat, ci) => (
                    <p key={ci} style={{ fontFamily: "var(--font-sans)", fontSize: 11, color: "var(--text-muted)", lineHeight: 1.5, marginBottom: 3, paddingLeft: 10, borderLeft: "2px solid var(--border-subtle)" }}>
                      {caveat}

                  ))}

              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div style={{ display: "flex", gap: 16 }}>
                  <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-muted)" }}>
                    {s.affected_loans.toLocaleString()} loans affected

                    {fmtM(s.affected_value)} in scope
                  </span>
                </div>
                <span style={{
                  fontFamily: "var(--font-mono)", fontSize: 10, fontWeight: 600,
                  padding: "3px 8px", borderRadius: 4,
                  background: colors.dim,
                  color: colors.accent,
                }}>
                  {Math.round(totalImpact)}% of total upside
                </span>
              </div>
            </div>
          );
        })}

        animationDelay: "360ms",

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginTop: 4 }}>
          {scenarios.map((s) => (
            <div key={s.id + "_meth"} style={{
              padding: "10px 14px",
              background: "var(--bg-surface)",
              borderRadius: 6,
              borderLeft: "2px solid var(--border)",

              <p style={{ fontFamily: "var(--font-sans)", fontSize: 11, fontWeight: 600, color: "var(--text-primary)", marginBottom: 4 }}>{s.lever}</p>
              <p style={{ fontFamily: "var(--font-sans)", fontSize: 11, color: "var(--text-muted)", lineHeight: 1.5 }}>{s.methodology}</p>

          ))}

        {wi.red_team_notes && (
          <div style={{ marginTop: 14, padding: "14px 16px", background: "rgba(232,113,106,0.04)", borderRadius: 6, border: "1px solid rgba(232,113,106,0.15)" }}>
            <p style={{ fontFamily: "var(--font-sans)", fontSize: 11, fontWeight: 600, color: "var(--red)", marginBottom: 8 }}>
              Analytical Caveats (Red-Team Review)
            </p>
            <p style={{ fontFamily: "var(--font-sans)", fontSize: 11, color: "var(--text-secondary)", lineHeight: 1.6, marginBottom: 6 }}>
              <strong>Overlap:</strong> {wi.red_team_notes.overlap_explanation}
            </p>
            <p style={{ fontFamily: "var(--font-sans)", fontSize: 11, color: "var(--text-secondary)", lineHeight: 1.6, marginBottom: 6 }}>
              <strong>Correlation vs Causation:</strong> {wi.red_team_notes.correlation_vs_causation}
            </p>
            <p style={{ fontFamily: "var(--font-sans)", fontSize: 11, color: "var(--text-secondary)", lineHeight: 1.6 }}>
              <strong>Summary:</strong> {wi.red_team_notes.confidence_summary}
            </p>
          </div>
        )}
        <p style={{ fontFamily: "var(--font-sans)", fontSize: 11, color: "var(--text-muted)", marginTop: 14, lineHeight: 1.6, fontStyle: "italic" }}>
          All estimates are conservative and use actual historical loan data (Jan 2023–Dec 2025). Scenarios are additive
          only if the underlying borrower populations don't fully overlap. Actual recoverable volume may be higher or lower
          depending on market conditions and operational capacity.
        </p>
      </div>
    </div>
  );
}


// ─── Tab: Scorecards ─────────────────────────────────────────────────────

function ScorecardsTab() {
  const sc = DATA.performanceScorecards || { products: [], channels: [], rankings: [] };
  const products = sc.products || [];
  const channels = sc.channels || [];
  const rankings = sc.rankings || [];

  const thStyle = {
    padding: "10px 14px",
    fontFamily: "var(--font-sans)", fontSize: 11, fontWeight: 700,
    color: "var(--text-muted)", textTransform: "uppercase",
    letterSpacing: "0.05em", whiteSpace: "nowrap", textAlign: "center",
  };
  const tdStyle = { padding: "12px 14px", fontFamily: "var(--font-sans)", fontSize: 13, textAlign: "center" };
  const monoStyle = { fontFamily: "var(--font-mono)" };

  const trendArrow = (t) => {
    if (t === "up") return { symbol: "\u2191", color: "var(--green)" };
    if (t === "down") return { symbol: "\u2193", color: "var(--red)" };
    return { symbol: "\u2192", color: "var(--text-muted)" };
  };

  // Color thresholds for pull-through rate cell
  const ptColor = (v) => {
    if (v >= 0.35) return "var(--green)";
    if (v >= 0.20) return "var(--copper)";
    return "var(--red)";
  };

  // Color for revenue efficiency
  const effColor = (v) => {
    if (v >= 0.4) return "var(--green)";
    if (v >= 0.2) return "var(--copper)";
    return "var(--red)";
  };

  // Tier badge colors for rankings
  const tierColors = {
    top: { bg: "rgba(61,170,127,0.15)", border: "var(--green)", text: "var(--green)", label: "TOP" },
    mid: { bg: "rgba(232,145,58,0.10)", border: "var(--border-subtle)", text: "var(--text-muted)", label: "MID" },
    bottom: { bg: "rgba(232,90,90,0.12)", border: "var(--red)", text: "var(--red)", label: "DRAG" },
  };

  // Channel color accent
  const channelColor = (name) => {
    if (/wholesale/i.test(name)) return "var(--blue)";
    if (/retail/i.test(name)) return "var(--copper)";
    return "var(--border)";
  };

  // Hero KPI cards: top product, bottom product, best channel, overall avg pt
  const topProduct = rankings[0];
  const bottomProduct = rankings[rankings.length - 1];
  const wsCh = channels.find(c => /wholesale/i.test(c.name));
  const rtCh = channels.find(c => /retail/i.test(c.name));
  const overallPt = products.length > 0
    ? products.reduce((s, p) => s + p.pull_through_rate, 0) / products.length
    : 0;

  return (
    <div>
      {/* Hero KPIs */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 18 }}>
        <Metric
          label="Top Product"
          value={topProduct ? topProduct.name : "—"}
          sub={topProduct ? (topProduct.pull_through_rate * 100).toFixed(1) + "% pull-through" : ""}
          accent="var(--green)" delay={0}
        />
        <Metric
          label="Lowest Product"
          value={bottomProduct ? bottomProduct.name : "—"}
          sub={bottomProduct ? (bottomProduct.pull_through_rate * 100).toFixed(1) + "% pull-through" : ""}
          accent="var(--red)" delay={60}
        />
        <Metric
          label="Wholesale Avg Prob"
          value={wsCh ? (wsCh.avg_pipeline_probability * 100).toFixed(1) + "%" : "—"}
          sub={wsCh ? wsCh.current_active_loans + " active loans" : ""}
          accent="var(--blue)" delay={120}
        />
        <Metric
          label="Retail Avg Prob"
          value={rtCh ? (rtCh.avg_pipeline_probability * 100).toFixed(1) + "%" : "—"}
          sub={rtCh ? rtCh.current_active_loans + " active loans" : ""}
          accent="var(--copper)" delay={180}
        />
      </div>

      {/* Product Scorecard Table */}
      <div className="fade-up" style={{
        animationDelay: "220ms", marginTop: 28,
        background: "var(--bg-card)", border: "1px solid var(--border-subtle)", borderRadius: 10, overflow: "hidden",
      }}>
        <div style={{ padding: "18px 24px", borderBottom: "1px solid var(--border-subtle)" }}>
          <h3 style={{ fontFamily: "var(--font-sans)", fontSize: 16, fontWeight: 700, color: "var(--text-primary)", letterSpacing: "-0.02em" }}>
            Product Performance Scorecards
          </h3>
          <p style={{ fontFamily: "var(--font-sans)", fontSize: 12, color: "var(--text-muted)", marginTop: 3 }}>
            Pull-through, cycle time, and revenue efficiency by product type — trend arrows compare last 3 months vs prior 3 months
          </p>
        </div>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ borderBottom: "1px solid var(--border-subtle)" }}>
                <th style={thStyle}>Product</th>
                <th style={thStyle}>Composite</th>
                <th style={{ ...thStyle, textAlign: "center" }}>Trend</th>
                <th style={thStyle}>Pull-Through</th>
                <th style={thStyle}>Recent 3M</th>
                <th style={thStyle}>Prior 3M</th>
                <th style={thStyle}>Cycle (med)</th>
                <th style={thStyle}>Avg Loan</th>
                <th style={thStyle}>6M Funded Vol</th>
                <th style={thStyle}>Rev Efficiency</th>
                <th style={thStyle}>Active Loans</th>
                <th style={thStyle}>Projected</th>
              </tr>
            </thead>
            <tbody>
              {products.map((p, i) => {
                const arrow = trendArrow(p.pt_trend);
                const isEven = i % 2 === 0;
                return (
                  <tr key={p.name} style={{
                    borderBottom: "1px solid var(--border-subtle)",
                    background: isEven ? "transparent" : "rgba(255,255,255,0.01)",
                  }}>
                    <td style={{ ...tdStyle, fontWeight: 600, color: "var(--text-primary)", textAlign: "left" }}>{p.name}</td>
                    <td style={{ ...tdStyle }}>
                      <span style={{
                        ...monoStyle, fontSize: 16, fontWeight: 700,
                        color: p.composite_score >= 60 ? "var(--green)" : p.composite_score >= 40 ? "var(--copper)" : "var(--red)",
                      }}>{p.composite_score || "\u2014"}</span>
                    </td>
                    <td style={{ ...tdStyle, textAlign: "center" }}>
                      <span style={{ ...monoStyle, fontSize: 16, fontWeight: 700, color: arrow.color }}>
                        {arrow.symbol}
                      </span>
                    </td>
                    <td style={{ ...tdStyle }}>
                      <span style={{ ...monoStyle, fontWeight: 600, color: ptColor(p.pull_through_rate) }}>
                        {(p.pull_through_rate * 100).toFixed(1)}%
                      </span>
                    </td>
                    <td style={{ ...tdStyle, ...monoStyle, color: "var(--text-secondary)" }}>
                      {(p.pt_recent_3m * 100).toFixed(1)}%
                    </td>
                    <td style={{ ...tdStyle, ...monoStyle, color: "var(--text-muted)" }}>
                      {(p.pt_prior_3m * 100).toFixed(1)}%
                    </td>
                    <td style={{ ...tdStyle, ...monoStyle, color: "var(--text-secondary)" }}>
                      {p.median_cycle_days != null ? p.median_cycle_days + "d" : "—"}
                    </td>
                    <td style={{ ...tdStyle, ...monoStyle, color: "var(--text-secondary)" }}>
                      {fmtK(p.avg_loan_amount)}
                    </td>
                    <td style={{ ...tdStyle, ...monoStyle, color: "var(--copper)" }}>
                      {fmtM(p.funded_volume_6m)}
                    </td>
                    <td style={{ ...tdStyle }}>
                      <span style={{
                        ...monoStyle, fontSize: 11, fontWeight: 600,
                        color: effColor(p.revenue_efficiency),
                        background: effColor(p.revenue_efficiency) === "var(--green)"
                          ? "rgba(61,170,127,0.12)"
                          : effColor(p.revenue_efficiency) === "var(--copper)"
                            ? "rgba(232,145,58,0.12)"
                            : "rgba(232,90,90,0.12)",
                        padding: "2px 7px", borderRadius: 4,
                      }}>
                        {(p.revenue_efficiency * 100).toFixed(1)}%
                      </span>
                    </td>
                    <td style={{ ...tdStyle, ...monoStyle, color: "var(--text-secondary)" }}>
                      {p.current_active_loans}
                    </td>
                    <td style={{ ...tdStyle, ...monoStyle, fontWeight: 600, color: "var(--text-primary)" }}>
                      {fmtM(p.current_projected_value)}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Channel Comparison */}
      <div className="fade-up" style={{ animationDelay: "300ms", marginTop: 20 }}>
        <SectionTitle title="Channel Comparison" sub="Wholesale vs Retail — side-by-side performance metrics" />
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: 16 }}>
          {channels.filter(c => !/unknown/i.test(c.name)).map((ch, i) => {
            const accent = channelColor(ch.name);
            const arrow = trendArrow(ch.pt_trend);
            return (
              <div key={ch.name} className="fade-up" style={{
                animationDelay: (340 + i * 80) + "ms",
                padding: 24,
                background: "var(--bg-card)",
                border: "1px solid var(--border-subtle)",
                borderRadius: 10,
                borderTop: "3px solid " + accent,
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
                  <h4 style={{ fontFamily: "var(--font-sans)", fontSize: 16, fontWeight: 700, color: "var(--text-primary)" }}>
                    {ch.name}
                  </h4>
                  <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, fontWeight: 600,
                    color: accent, background: accent === "var(--blue)" ? "rgba(83,142,210,0.15)" : "rgba(232,145,58,0.15)",
                    padding: "3px 10px", borderRadius: 4 }}>
                    {ch.current_active_loans} active
                  </span>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                  {[
                    { label: "Pull-Through", value: (ch.pull_through_rate * 100).toFixed(1) + "%", color: ptColor(ch.pull_through_rate) },
                    { label: "Trend", value: arrow.symbol + " " + (ch.pt_trend_delta > 0 ? "+" : "") + (ch.pt_trend_delta * 100).toFixed(1) + "pp", color: arrow.color },
                    { label: "Median Cycle", value: ch.median_cycle_days != null ? ch.median_cycle_days + "d" : "—", color: "var(--text-primary)" },
                    { label: "Avg Loan", value: fmtK(ch.avg_loan_amount), color: "var(--text-primary)" },
                    { label: "6M Funded Vol", value: fmtM(ch.funded_volume_6m), color: "var(--copper)" },
                    { label: "Rev Efficiency", value: (ch.revenue_efficiency * 100).toFixed(1) + "%", color: effColor(ch.revenue_efficiency) },
                    { label: "Avg Pipeline Prob", value: (ch.avg_pipeline_probability * 100).toFixed(1) + "%", color: ptColor(ch.avg_pipeline_probability) },
                    { label: "Projected Value", value: fmtM(ch.current_projected_value), color: accent },
                  ].map(({ label, value, color }) => (
                    <div key={label} style={{ padding: "10px 12px", background: "var(--bg-surface)", borderRadius: 6 }}>
                      <p style={{ fontFamily: "var(--font-sans)", fontSize: 10, fontWeight: 600,
                        color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>
                        {label}
                      </p>
                      <p style={{ fontFamily: "var(--font-mono)", fontSize: 15, fontWeight: 600, color }}>
                        {value}
                      </p>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Money Makers vs Drains Ranking */}
      <div className="fade-up" style={{
        animationDelay: "480ms", marginTop: 20,
        background: "var(--bg-card)", border: "1px solid var(--border-subtle)", borderRadius: 10, overflow: "hidden",
      }}>
        <div style={{ padding: "18px 24px", borderBottom: "1px solid var(--border-subtle)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <h3 style={{ fontFamily: "var(--font-sans)", fontSize: 16, fontWeight: 700, color: "var(--text-primary)", letterSpacing: "-0.02em" }}>
              Money Makers vs Drains
            </h3>
            <p style={{ fontFamily: "var(--font-sans)", fontSize: 12, color: "var(--text-muted)", marginTop: 2 }}>
              Ranked by efficiency score = pull-through rate × average loan amount. Top products generate the most revenue per pipeline dollar.
            </p>
          </div>
          <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-muted)" }}>
            Efficiency score = pull-through × avg loan
          </span>
        </div>
        <div style={{ padding: "16px 24px", display: "grid", gap: 10 }}>
          {rankings.map((r, i) => {
            const tc = tierColors[r.tier] || tierColors.mid;
            const maxScore = rankings[0] ? rankings[0].efficiency_score : 1;
            const barPct = maxScore > 0 ? (r.efficiency_score / maxScore * 100) : 0;
            const arrow = trendArrow(r.pt_trend);
            return (
              <div key={r.name} className="fade-up" style={{
                animationDelay: (520 + i * 40) + "ms",
                padding: "14px 18px",
                background: tc.bg,
                border: "1px solid " + tc.border,
                borderRadius: 8,
                display: "flex", alignItems: "center", gap: 16,
              }}>
                {/* Rank badge */}
                <div style={{
                  minWidth: 32, height: 32, borderRadius: 6,
                  background: tc.bg, border: "1px solid " + tc.border,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontFamily: "var(--font-mono)", fontSize: 13, fontWeight: 700, color: tc.text,
                }}>
                  {r.rank}
                </div>

                {/* Name + tier */}
                <div style={{ minWidth: 180 }}>
                  <span style={{ fontFamily: "var(--font-sans)", fontSize: 13, fontWeight: 700, color: "var(--text-primary)" }}>
                    {r.name}
                  </span>
                  <span style={{
                    marginLeft: 8, fontFamily: "var(--font-mono)", fontSize: 9, fontWeight: 700,
                    color: tc.text, padding: "2px 6px", borderRadius: 3,
                    background: "rgba(255,255,255,0.06)", border: "1px solid " + tc.border,
                  }}>
                    {tc.label}
                  </span>
                </div>

                {/* Bar */}
                <div style={{ flex: 1, height: 6, borderRadius: 3, background: "var(--bg-surface)", overflow: "hidden" }}>
                  <div style={{
                    width: barPct + "%", height: "100%", borderRadius: 3,
                    background: r.tier === "top" ? "var(--green)" : r.tier === "bottom" ? "var(--red)" : "var(--copper)",
                    transition: "width 0.6s ease",
                  }} />
                </div>

                {/* Metrics */}
                <div style={{ display: "flex", gap: 24, minWidth: 440, justifyContent: "flex-end" }}>
                  <div style={{ textAlign: "right" }}>
                    <p style={{ fontFamily: "var(--font-sans)", fontSize: 9, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.06em" }}>Composite</p>
                    <p style={{ fontFamily: "var(--font-mono)", fontSize: 14, fontWeight: 700, color: r.composite_score >= 60 ? "var(--green)" : r.composite_score >= 40 ? "var(--copper)" : "var(--red)" }}>
                      {r.composite_score || "\u2014"}
                    </p>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <p style={{ fontFamily: "var(--font-sans)", fontSize: 9, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.06em" }}>Pull-Through</p>
                    <p style={{ fontFamily: "var(--font-mono)", fontSize: 13, fontWeight: 600, color: ptColor(r.pull_through_rate) }}>
                      {(r.pull_through_rate * 100).toFixed(1)}%
                    </p>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <p style={{ fontFamily: "var(--font-sans)", fontSize: 9, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.06em" }}>Avg Loan</p>
                    <p style={{ fontFamily: "var(--font-mono)", fontSize: 13, fontWeight: 600, color: "var(--text-secondary)" }}>
                      {fmtK(r.avg_loan_amount)}
                    </p>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <p style={{ fontFamily: "var(--font-sans)", fontSize: 9, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.06em" }}>6M Volume</p>
                    <p style={{ fontFamily: "var(--font-mono)", fontSize: 13, fontWeight: 600, color: "var(--copper)" }}>
                      {fmtM(r.funded_volume_6m)}
                    </p>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <p style={{ fontFamily: "var(--font-sans)", fontSize: 9, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.06em" }}>Trend</p>
                    <p style={{ fontFamily: "var(--font-mono)", fontSize: 16, fontWeight: 700, color: arrow.color }}>
                      {arrow.symbol}
                    </p>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <p style={{ fontFamily: "var(--font-sans)", fontSize: 9, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.06em" }}>Efficiency</p>
                    <p style={{ fontFamily: "var(--font-mono)", fontSize: 13, fontWeight: 700, color: tc.text }}>
                      {r.efficiency_score >= 1000 ? (r.efficiency_score / 1000).toFixed(0) + "K" : r.efficiency_score}
                    </p>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}
